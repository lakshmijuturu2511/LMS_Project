<!DOCTYPE html>
<html>
<head>
    <title>Course</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>📚 LMS</h2>
    <a href="/dashboard" class="btn">⬅ Back</a>
</div>

<div class="container">
    <h1>📘 Course</h1>

    <!-- Progress -->
    <h3>Progress: {{ progress }}%</h3>
    <div class="progress-bar">
        <div class="progress-fill" style="width: {{ progress }}%;">
            {{ progress }}%
        </div>
    </div>

    <!-- Lessons -->
    <div class="lessons">
        {% if lessons %}
            {% for lesson in lessons %}
            <div class="lesson-card">
                <h3>{{ lesson.title }}</h3>

                <iframe 
                    src="{{ lesson.content }}" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>

                <a href="/complete/{{ lesson.id }}/{{ lesson.course_id }}" class="btn">
    Mark Complete
</a>
                    Mark Complete
                </a>
            </div>
            {% endfor %}
        {% else %}
            <p>No lessons available</p>
        {% endif %}
    </div>
</div>

</body>
</html>
